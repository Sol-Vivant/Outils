<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulateur de Focalisation Parabolique</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #050505; color: #fff; }

        input[type="range"] {
            -webkit-appearance: none; appearance: none;
            width: 100%; height: 4px;
            background: #262626; border-radius: 2px; outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 16px; height: 16px;
            background: #f97316; border-radius: 50%; cursor: pointer;
            box-shadow: 0 0 10px rgba(249,115,22,0.5);
            transition: box-shadow 0.2s;
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            box-shadow: 0 0 16px rgba(249,115,22,0.7);
        }
        input[type="range"]::-moz-range-thumb {
            width: 16px; height: 16px;
            background: #f97316; border-radius: 50%;
            cursor: pointer; border: none;
            box-shadow: 0 0 10px rgba(249,115,22,0.5);
        }

        .ctrl-label {
            font-size: 11px; font-weight: 500;
            text-transform: uppercase; letter-spacing: 0.06em;
            color: #737373; margin-bottom: 6px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .ctrl-val { color: #f97316; font-weight: 600; font-variant-numeric: tabular-nums; }

        .toggle-wrap {
            display: flex; gap: 3px;
            background: #171717; border-radius: 8px; padding: 3px;
        }
        .toggle-btn {
            flex: 1; padding: 7px 10px; border: none;
            background: transparent; color: #737373;
            font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500;
            border-radius: 6px; cursor: pointer; transition: all 0.25s;
        }
        .toggle-btn.active { background: #f97316; color: #000; }
        .toggle-btn:hover:not(.active) { color: #a3a3a3; }

        .info-row {
            display: flex; justify-content: space-between;
            font-size: 12px; padding: 3px 0;
        }
        .info-row .lbl { color: #525252; }
        .info-row .val { color: #f97316; font-weight: 500; font-variant-numeric: tabular-nums; }
        .info-row.highlight .val { color: #fb923c; font-weight: 600; font-size: 13px; }

        .quality-track {
            height: 5px; background: #171717; border-radius: 3px; overflow: hidden;
        }
        .quality-fill {
            height: 100%; border-radius: 3px;
            transition: width 0.35s ease, background 0.35s ease;
        }

        canvas { display: block; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-3 sm:p-6">

<div class="w-full" style="max-width:980px;">
    <div class="bg-[#0a0a0a] border border-white/[0.07] rounded-2xl overflow-hidden shadow-2xl shadow-black/50">
        <div class="flex flex-col md:flex-row">

            <!-- Zone Canvas -->
            <div class="flex-1 relative bg-[#080808]" id="canvasWrap">
                <canvas id="c"></canvas>
            </div>

            <!-- Panneau Contrôles -->
            <div class="w-full md:w-[256px] shrink-0 p-5 border-t md:border-t-0 md:border-l border-white/[0.06] bg-[#0a0a0a] flex flex-col gap-4">

                <div class="text-[13px] font-semibold text-neutral-300 tracking-wide">Paramètres</div>

                <!-- Type de surface -->
                <div>
                    <div class="ctrl-label"><span>Surface</span></div>
                    <div class="toggle-wrap">
                        <button class="toggle-btn active" id="btnS" onclick="setSurface('smooth')">Lisse</button>
                        <button class="toggle-btn" id="btnF" onclick="setSurface('faceted')">Facettes</button>
                    </div>
                </div>

                <!-- Nombre de facettes -->
                <div id="facWrap" style="display:none;">
                    <div class="ctrl-label">
                        <span>Facettes</span>
                        <span class="ctrl-val" id="vN">8</span>
                    </div>
                    <input type="range" id="sN" min="3" max="64" value="8" oninput="upd()">
                </div>

                <!-- Diamètre -->
                <div>
                    <div class="ctrl-label">
                        <span>Diamètre</span>
                        <span class="ctrl-val" id="vD">280</span>
                    </div>
                    <input type="range" id="sD" min="80" max="440" value="280" oninput="upd()">
                </div>

                <!-- Profondeur -->
                <div>
                    <div class="ctrl-label">
                        <span>Profondeur</span>
                        <span class="ctrl-val" id="vH">75</span>
                    </div>
                    <input type="range" id="sH" min="15" max="180" value="75" oninput="upd()">
                </div>

                <!-- Rayons -->
                <div>
                    <div class="ctrl-label">
                        <span>Rayons incidents</span>
                        <span class="ctrl-val" id="vR">17</span>
                    </div>
                    <input type="range" id="sR" min="3" max="50" value="17" oninput="upd()">
                </div>

                <!-- Angle -->
                <div>
                    <div class="ctrl-label">
                        <span>Inclinaison</span>
                        <span class="ctrl-val" id="vA">0°</span>
                    </div>
                    <input type="range" id="sA" min="-35" max="35" value="0" step="1" oninput="upd()">
                </div>

                <div class="h-px bg-white/[0.06]"></div>

                <!-- Résultats -->
                <div class="text-[13px] font-semibold text-neutral-300 tracking-wide">Résultats</div>

                <div class="flex flex-col gap-1">
                    <div class="info-row highlight">
                        <span class="lbl">Base → Foyer</span>
                        <span class="val" id="iBF">—</span>
                    </div>
                    <div class="info-row highlight">
                        <span class="lbl">Bord → Foyer</span>
                        <span class="val" id="iEF">—</span>
                    </div>
                    <div class="info-row"><span class="lbl">Rapport f / D</span><span class="val" id="iFD">—</span></div>
                    <div class="info-row"><span class="lbl">Taille du foyer</span><span class="val" id="iSp">—</span></div>
                    <div class="info-row"><span class="lbl">Concentration</span><span class="val" id="iCo">—</span></div>
                </div>

                <!-- Qualité focale -->
                <div>
                    <div class="ctrl-label mb-2"><span>Qualité focale</span><span class="ctrl-val" id="qT">—</span></div>
                    <div class="quality-track">
                        <div class="quality-fill" id="qB" style="width:100%;background:#22c55e;"></div>
                    </div>
                </div>

                <!-- Légende -->
                <div class="mt-auto pt-3 border-t border-white/[0.06]">
                    <div class="flex items-center gap-2 text-[10px] text-neutral-500 mb-1.5">
                        <span class="w-3 h-[2px] bg-amber-400/70 inline-block rounded"></span> Rayons incidents
                    </div>
                    <div class="flex items-center gap-2 text-[10px] text-neutral-500 mb-1.5">
                        <span class="w-3 h-[2px] bg-red-500/70 inline-block rounded"></span> Rayons réfléchis
                    </div>
                    <div class="flex items-center gap-2 text-[10px] text-neutral-500 mb-1.5">
                        <span class="w-3 h-[2px] bg-orange-400/70 inline-block rounded"></span> Base → Foyer
                    </div>
                    <div class="flex items-center gap-2 text-[10px] text-neutral-500">
                        <span class="w-2.5 h-2.5 rounded-full bg-orange-500/60 inline-block"></span> Zone focale
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// ─── État ───────────────────────────────────────────
let surfaceType = 'smooth';
let facetCount  = 8;
let diameter    = 280;
let depth       = 75;
let rayCount    = 17;
let angle       = 0;

// ─── Canvas ─────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H, cx, vy, sc;

function resize() {
    const wrap = document.getElementById('canvasWrap');
    W = wrap.clientWidth;
    H = Math.max(420, Math.min(560, W * 0.6));
    const dpr = window.devicePixelRatio || 1;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cx = W / 2;
    vy = H * 0.82;
    draw();
}

// ─── Math ───────────────────────────────────────────
function fLen() { return (diameter * diameter) / (16 * depth); }
function pY(x)  { return (x * x) / (4 * fLen()); }

function calcScale() {
    const hd = diameter / 2;
    const f  = fLen();
    const maxHW = (W / 2) - 60;
    const maxUp = vy - 100;
    return Math.min(1, maxHW / Math.max(1, hd), maxUp / Math.max(1, depth), maxUp / Math.max(1, f));
}
function toX(x) { return cx + x * sc; }
function toY(y) { return vy - y * sc; }

// ─── Calcul des rayons ─────────────────────────────
function calcRays() {
    const f   = fLen();
    const hd  = diameter / 2;
    const aR  = angle * Math.PI / 180;
    const dix = Math.sin(aR);
    const diy = -Math.cos(aR);
    const rays = [];

    if (surfaceType === 'smooth') {
        for (let i = 0; i < rayCount; i++) {
            const t = (i + 0.5) / rayCount;
            const x = -hd + t * diameter;
            const y = pY(x);
            const d = x / (2 * f);
            const nl = Math.sqrt(d * d + 1);
            const nx = -d / nl, ny = 1 / nl;
            const dot = dix * nx + diy * ny;
            rays.push({ hx: x, hy: y, rx: dix - 2*dot*nx, ry: diy - 2*dot*ny });
        }
    } else {
        const N  = facetCount;
        const nr = Math.min(rayCount, N);
        const fw = diameter / N;
        for (let i = 0; i < nr; i++) {
            const fi = nr === 1 ? 0 : Math.round(i * (N - 1) / (nr - 1));
            const x1 = -hd + fi * fw, x2 = x1 + fw;
            const y1 = pY(x1), y2 = pY(x2);
            const mx = (x1+x2)/2, my = (y1+y2)/2;
            const sdx = x2-x1, sdy = y2-y1;
            const sl = Math.sqrt(sdx*sdx + sdy*sdy);
            const nx = -sdy/sl, ny = sdx/sl;
            const dot = dix * nx + diy * ny;
            rays.push({ hx: mx, hy: my, rx: dix - 2*dot*nx, ry: diy - 2*dot*ny });
        }
    }
    return rays;
}

// ─── Dessin ─────────────────────────────────────────
function draw() {
    sc = calcScale();
    const f  = fLen();
    const hd = diameter / 2;
    const aR = angle * Math.PI / 180;

    // Fond
    ctx.fillStyle = '#080808';
    ctx.fillRect(0, 0, W, H);

    // Grille subtile
    ctx.strokeStyle = 'rgba(255,255,255,0.025)';
    ctx.lineWidth = 0.5;
    const gs = 50 * sc;
    if (gs > 8) {
        for (let x = cx % gs; x < W; x += gs) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
        for (let y = vy % gs; y > 0; y -= gs) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
        for (let y = vy % gs; y < H; y += gs) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
    }

    // Axe optique
    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 6]);
    ctx.beginPath(); ctx.moveTo(cx, 8); ctx.lineTo(cx, vy + 8); ctx.stroke();
    ctx.setLineDash([]);

    // Cote Base → Foyer (avant les rayons pour être en arrière-plan)
    drawFocalDist(f);

    // Rayons
    const rays = calcRays();
    const rayLen = Math.max(60, Math.min(200, depth * 2.5));
    const reflLen = Math.max(80, Math.min(400, f * 1.5, (vy - 30) / sc));

    // Rayons incidents
    ctx.lineWidth = 1.1;
    for (const r of rays) {
        const sx = toX(r.hx) - rayLen * sc * Math.sin(aR);
        const sy = toY(r.hy) - rayLen * sc * Math.cos(aR);
        const ex = toX(r.hx), ey = toY(r.hy);
        const g = ctx.createLinearGradient(sx, sy, ex, ey);
        g.addColorStop(0, 'rgba(251,191,36,0)');
        g.addColorStop(0.35, 'rgba(251,191,36,0.2)');
        g.addColorStop(1, 'rgba(251,191,36,0.55)');
        ctx.strokeStyle = g;
        ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
    }

    // Rayons réfléchis
    ctx.lineWidth = 0.9;
    for (const r of rays) {
        const sx = toX(r.hx), sy = toY(r.hy);
        const ex = toX(r.hx + r.rx * reflLen);
        const ey = toY(r.hy + r.ry * reflLen);
        const g = ctx.createLinearGradient(sx, sy, ex, ey);
        g.addColorStop(0, 'rgba(239,68,68,0.5)');
        g.addColorStop(0.5, 'rgba(239,68,68,0.18)');
        g.addColorStop(1, 'rgba(239,68,68,0)');
        ctx.strokeStyle = g;
        ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
    }

    // Points de réflexion
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    for (const r of rays) {
        ctx.beginPath(); ctx.arc(toX(r.hx), toY(r.hy), 1.8, 0, Math.PI*2); ctx.fill();
    }

    // Zone focale
    drawFocal(rays);

    // Parabole
    drawParabola();

    // Dimensions D et h
    drawDims();

    // Soleil
    drawSun(aR);

    // Infos
    updateInfo();
}

function drawFocalDist(f) {
    // Ligne de cote Base → Foyer le long de l'axe, légèrement décalée à gauche
    const dx = cx - 30;
    const yBase = vy;
    const yFoc  = toY(f);

    if (yFoc < 20 || yFoc > vy - 10) return;

    // Ligne verticale
    ctx.strokeStyle = 'rgba(249,115,22,0.35)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(dx, yBase); ctx.lineTo(dx, yFoc); ctx.stroke();
    ctx.setLineDash([]);

    // Flèches
    arrowV(dx, yBase, 1);    // vers le haut en bas
    arrowV(dx, yFoc, -1);    // vers le bas en haut

    // Tirets horizontaux de repère
    ctx.strokeStyle = 'rgba(249,115,22,0.15)';
    ctx.lineWidth = 0.7;
    ctx.setLineDash([2, 3]);
    ctx.beginPath(); ctx.moveTo(cx, yBase); ctx.lineTo(dx - 5, yBase); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, yFoc);  ctx.lineTo(dx - 5, yFoc);  ctx.stroke();
    ctx.setLineDash([]);

    // Label
    ctx.save();
    ctx.translate(dx - 8, (yBase + yFoc) / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.font = '600 10px Inter';
    ctx.fillStyle = 'rgba(249,115,22,0.6)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('f = ' + f.toFixed(1), 0, 0);
    ctx.restore();

    // Petit marqueur "base" au niveau du sommet
    ctx.font = '500 9px Inter';
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.textAlign = 'right';
    ctx.fillText('base', dx - 12, yBase + 3);
}

function arrowV(x, y, dir) {
    const s = 4;
    ctx.save(); ctx.translate(x, y);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(-s, dir * s * 0.8);
    ctx.lineTo(s, dir * s * 0.8);
    ctx.closePath();
    ctx.fillStyle = 'rgba(249,115,22,0.45)';
    ctx.fill();
    ctx.restore();
}

function drawFocal(rays) {
    const crossings = [];
    for (const r of rays) {
        if (Math.abs(r.rx) < 1e-6) continue;
        const t = -r.hx / r.rx;
        if (t > 0) {
            const cy = r.hy + t * r.ry;
            if (cy > 0) crossings.push(cy);
        }
    }
    if (crossings.length < 2) { window._spot = null; return; }

    const mean = crossings.reduce((a,b) => a+b, 0) / crossings.length;
    const vari = crossings.reduce((a,b) => a + (b-mean)**2, 0) / crossings.length;
    const std  = Math.sqrt(vari);

    const fcx = toX(0), fcy = toY(mean);
    if (fcy < -20 || fcy > vy + 20) { window._spot = null; return; }

    const glowR = Math.max(3, Math.min(55, std * sc * 3.5));
    const inten = Math.max(0.15, Math.min(1, 1 - std / 35));

    // Halo externe
    const g1 = ctx.createRadialGradient(fcx, fcy, 0, fcx, fcy, glowR * 4.5);
    g1.addColorStop(0, `rgba(249,115,22,${inten*0.55})`);
    g1.addColorStop(0.25, `rgba(239,68,68,${inten*0.22})`);
    g1.addColorStop(1, 'rgba(239,68,68,0)');
    ctx.fillStyle = g1;
    ctx.beginPath(); ctx.arc(fcx, fcy, glowR * 4.5, 0, Math.PI*2); ctx.fill();

    // Centre brillant
    const g2 = ctx.createRadialGradient(fcx, fcy, 0, fcx, fcy, Math.max(2, glowR * 0.5));
    g2.addColorStop(0, `rgba(255,255,255,${inten*0.9})`);
    g2.addColorStop(0.4, `rgba(255,210,120,${inten*0.45})`);
    g2.addColorStop(1, 'rgba(255,160,60,0)');
    ctx.fillStyle = g2;
    ctx.beginPath(); ctx.arc(fcx, fcy, Math.max(2, glowR * 0.5), 0, Math.PI*2); ctx.fill();

    // Points de croisement
    ctx.fillStyle = `rgba(255,200,100,${inten*0.6})`;
    for (const c of crossings) {
        const ccy = toY(c);
        if (ccy > 0 && ccy < vy) {
            ctx.beginPath(); ctx.arc(fcx, ccy, 1.4, 0, Math.PI*2); ctx.fill();
        }
    }

    window._spot = { mean, std };
}

function drawParabola() {
    const hd = diameter / 2;
    const N  = surfaceType === 'smooth' ? 150 : facetCount;
    const pts = [];

    for (let i = 0; i <= N; i++) {
        let x;
        if (surfaceType === 'smooth') {
            x = -hd + (i / N) * diameter;
        } else {
            x = -hd + i * (diameter / facetCount);
        }
        pts.push({ x, y: pY(x) });
    }

    // Corps rempli
    ctx.beginPath();
    ctx.moveTo(toX(pts[0].x), toY(pts[0].y));
    for (let i = 1; i < pts.length; i++) ctx.lineTo(toX(pts[i].x), toY(pts[i].y));
    ctx.lineTo(toX(hd), vy);
    ctx.lineTo(toX(-hd), vy);
    ctx.closePath();

    const gf = ctx.createLinearGradient(cx, toY(depth), cx, vy);
    gf.addColorStop(0, '#383838');
    gf.addColorStop(0.4, '#252525');
    gf.addColorStop(1, '#131313');
    ctx.fillStyle = gf;
    ctx.fill();

    // Bord brillant
    ctx.beginPath();
    ctx.moveTo(toX(pts[0].x), toY(pts[0].y));
    for (let i = 1; i < pts.length; i++) ctx.lineTo(toX(pts[i].x), toY(pts[i].y));

    const ge = ctx.createLinearGradient(toX(-hd), 0, toX(hd), 0);
    ge.addColorStop(0, '#777');
    ge.addColorStop(0.2, '#bbb');
    ge.addColorStop(0.45, '#e0e0e0');
    ge.addColorStop(0.55, '#e0e0e0');
    ge.addColorStop(0.8, '#bbb');
    ge.addColorStop(1, '#777');
    ctx.strokeStyle = ge;
    ctx.lineWidth = surfaceType === 'smooth' ? 2.5 : 2;
    ctx.stroke();

    // Arêtes des facettes
    if (surfaceType === 'faceted') {
        const fw = diameter / facetCount;
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.lineWidth = 0.7;
        for (let i = 1; i < facetCount; i++) {
            const x = -hd + i * fw;
            ctx.beginPath();
            ctx.moveTo(toX(x), toY(pY(x)));
            ctx.lineTo(toX(x), vy);
            ctx.stroke();
        }
    }

    // Points de bord
    ctx.fillStyle = '#c0c0c0';
    ctx.beginPath(); ctx.arc(toX(-hd), toY(pY(-hd)), 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(toX(hd), toY(pY(hd)), 3, 0, Math.PI*2); ctx.fill();
}

function drawDims() {
    const hd = diameter / 2;
    ctx.font = '500 10px Inter';
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.fillStyle   = 'rgba(255,255,255,0.3)';

    // Diamètre
    const dy = vy + 18 * sc + 14;
    ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(toX(-hd), dy); ctx.lineTo(toX(hd), dy); ctx.stroke();
    arrowH(toX(-hd), dy, 0); arrowH(toX(hd), dy, Math.PI);
    ctx.textAlign = 'center';
    ctx.fillText('D = ' + diameter, cx, dy + 14);

    // Profondeur
    const dx = toX(hd) + 22 * sc + 10;
    ctx.beginPath(); ctx.moveTo(dx, vy); ctx.lineTo(dx, toY(depth)); ctx.stroke();
    arrowV(dx, vy, 1); arrowV(dx, toY(depth), -1);
    ctx.save();
    ctx.translate(dx + 14, toY(depth/2));
    ctx.rotate(-Math.PI/2);
    ctx.textAlign = 'center';
    ctx.fillText('h = ' + depth, 0, 0);
    ctx.restore();
}

function arrowH(x, y, a) {
    const s = 4.5;
    ctx.save(); ctx.translate(x, y); ctx.rotate(a);
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-s,-s*0.45); ctx.lineTo(-s,s*0.45); ctx.closePath();
    ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fill();
    ctx.restore();
}

function drawSun(aR) {
    const sunX = cx - 70 * sc * Math.sin(aR);
    const sunY = 28;
    const r = 9;

    const g = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, r*3.5);
    g.addColorStop(0, 'rgba(251,191,36,0.28)');
    g.addColorStop(1, 'rgba(251,191,36,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(sunX, sunY, r*3.5, 0, Math.PI*2); ctx.fill();

    ctx.fillStyle = 'rgba(251,191,36,0.75)';
    ctx.beginPath(); ctx.arc(sunX, sunY, r, 0, Math.PI*2); ctx.fill();

    ctx.strokeStyle = 'rgba(251,191,36,0.25)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 8; i++) {
        const a = (i/8) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(sunX + Math.cos(a)*(r+2), sunY + Math.sin(a)*(r+2));
        ctx.lineTo(sunX + Math.cos(a)*(r+7), sunY + Math.sin(a)*(r+7));
        ctx.stroke();
    }
}

// ─── Infos ──────────────────────────────────────────
function updateInfo() {
    const f = fLen();
    const edgeToFoc = f - depth;

    document.getElementById('iBF').textContent = f.toFixed(1);
    document.getElementById('iEF').textContent = edgeToFoc > 0 ? edgeToFoc.toFixed(1) : '—';
    document.getElementById('iFD').textContent = (f / diameter).toFixed(3);

    if (window._spot) {
        const s = window._spot.std;
        document.getElementById('iSp').textContent = s.toFixed(2);

        const conc = s > 0.01 ? Math.min(9999, (diameter/2) / s) : 9999;
        document.getElementById('iCo').textContent = conc > 5000 ? '≈ ∞' : conc.toFixed(1) + '×';

        const q = s < 0.2 ? 100 : Math.max(0, Math.round(100 - s * 7));
        const bar = document.getElementById('qB');
        bar.style.width = q + '%';
        bar.style.background = q > 75 ? '#22c55e' : q > 35 ? '#f97316' : '#ef4444';
        document.getElementById('qT').textContent = q + '%';
    } else {
        document.getElementById('iSp').textContent = '—';
        document.getElementById('iCo').textContent = '—';
        document.getElementById('qB').style.width = '0%';
        document.getElementById('qT').textContent = '—';
    }
}

// ─── Contrôles ──────────────────────────────────────
function setSurface(t) {
    surfaceType = t;
    document.getElementById('btnS').classList.toggle('active', t === 'smooth');
    document.getElementById('btnF').classList.toggle('active', t === 'faceted');
    document.getElementById('facWrap').style.display = t === 'faceted' ? 'block' : 'none';
    draw();
}

function upd() {
    diameter    = +document.getElementById('sD').value;
    depth       = +document.getElementById('sH').value;
    facetCount  = +document.getElementById('sN').value;
    rayCount    = +document.getElementById('sR').value;
    angle       = +document.getElementById('sA').value;

    document.getElementById('vD').textContent = diameter;
    document.getElementById('vH').textContent = depth;
    document.getElementById('vN').textContent = facetCount;
    document.getElementById('vR').textContent = rayCount;
    document.getElementById('vA').textContent = angle + '°';
    draw();
}

// ─── Init ───────────────────────────────────────────
window.addEventListener('resize', resize);
resize();
</script>
